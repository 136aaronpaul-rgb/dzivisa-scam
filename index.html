<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dzivisa-Scam v11.1 by Aaron Paul</title>
<link rel="manifest" href="manifest.json">
<style>
body{background:#0E0E14;color:#fff;font-family:sans-serif;padding:12px;margin:0}
h1{color:#34C759;margin:10px 0 0;text-align:center}.sub{color:#A0A0B0;font-size:13px;text-align:center}.by{color:#34C759;font-weight:bold;font-size:12px;text-align:center;margin:5px 0 15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.box{background:#1E1E2E;border-radius:12px;padding:10px;border:1px solid #333}
.box h3{margin:5px 0;font-size:14px;color:#34C759}.box textarea{width:100%;height:60px;background:#0E0E14;color:#fff;border:1px solid #34C759;border-radius:8px;padding:6px;font-size:13px;box-sizing:border-box}
.box button{width:100%;background:#34C759;color:#000;font-weight:bold;padding:8px;border:none;border-radius:8px;margin-top:6px;font-size:13px}
.card{background:#1E1E2E;border-radius:10px;padding:10px;margin-top:10px;border-left:4px solid #34C759;font-size:13px}
.red{border-left-color:#FF3B30}.yellow{border-left-color:#FFCC00}.green{border-left-color:#34C759}
#result{font-size:18px;font-weight:bold;margin-top:15px;text-align:center} #score{text-align:center;font-size:13px;color:#aaa;margin:5px}
footer{text-align:center;margin-top:20px;color:#666;font-size:11px}
</style>
</head>
<body>
<h1>Dzivisa-Scam v11.1</h1>
<div class="sub">The Unshakeable Guardian for Zimbabwe</div>
<div class="by">Built by Aaron Paul - 6 Shield Protection</div>

<div class="grid">
<div class="box"><h3>📘 Facebook</h3><textarea id="fb" placeholder="Paste FB link/message"></textarea><button onclick="scan('fb','Facebook')">Scan FB</button></div>
<div class="box"><h3>📸 Instagram</h3><textarea id="ig" placeholder="Paste IG link"></textarea><button onclick="scan('ig','Instagram')">Scan IG</button></div>
<div class="box"><h3>🎵 TikTok</h3><textarea id="tk" placeholder="Paste TikTok link"></textarea><button onclick="scan('tk','TikTok')">Scan TikTok</button></div>
<div class="box"><h3>💬 WhatsApp</h3><textarea id="wa" placeholder="Paste WhatsApp msg"></textarea><button onclick="scan('wa','WhatsApp')">Scan WA</button></div>
<div class="box"><h3>📩 SMS / Message</h3><textarea id="sms" placeholder="Paste SMS / EcoCash msg"></textarea><button onclick="scan('sms','SMS')">Scan SMS</button></div>
<div class="box"><h3>🔢 Number / USSD</h3><textarea id="num" placeholder="Paste *151# or number"></textarea><button onclick="scan('num','USSD')">Scan Number</button></div>
</div>

<div id="result">Waiting...</div>
<div id="score"></div>
<div id="details"></div>

<footer>
<p>🔒 Built by AARON 🇿🇼 | 23 July 2026</p>
<p>dzivisa-scam-v11.surge.sh | Protected</p>
</footer>
<script>
const LEGIT_USSD=["*151#","*153#","*121#","*140#","*111#","*124#","*144#","*152#","*150#"];
const REAL_DOMAINS=["facebook.com","instagram.com","tiktok.com","whatsapp.com","wa.me","x.com","threads.net","ecocash.co.zw"];
function getDomain(url){try{let u=url.startsWith('http')?url:'https://'+url;return new URL(u).hostname.toLowerCase();}catch(e){return url.toLowerCase().split('/')[0];}}
function scan(id, type){
 let raw=document.getElementById(id).value; if(!raw){alert('Paste something in '+type);return;}
 let text=raw.toLowerCase(); let score=0; let cards=[];
 let ussdMatches=raw.match(/\*\d+[\*\d+]*#/g)||[];
 ussdMatches.forEach(code=>{if(!LEGIT_USSD.includes(code)){score+=40;cards.push(`<div class="card red"><b>⚠️ FAKE USSD in ${type}:</b> ${code}<br><span>Legit: ${LEGIT_USSD.join(', ')}</span></div>`);}else{cards.push(`<div class="card green"><b>✅ Legit USSD:</b> ${code}</div>`);}});
 let links=raw.match(/https?:\/\/[^\s]+|www\.[^\s]+|bit\.ly\/[^\s]+|[a-z0-9-]+\.tk\b/g)||[];
 links.forEach(link=>{let domain=getDomain(link); let isReal=REAL_DOMAINS.some(d=>domain===d||domain.endsWith('.'+d)); if(domain.includes("facebook")&&!(domain==="facebook.com"||domain.endsWith(".facebook.com"))){score+=40;cards.push(`<div class="card red"><b>🎭 FAKE FACEBOOK LINK in ${type}:</b> ${link}</div>`);} else if(domain.includes("instagram")&&!(domain==="instagram.com"||domain.endsWith(".instagram.com"))){score+=40;cards.push(`<div class="card red"><b>🎭 FAKE INSTAGRAM in ${type}:</b> ${link}</div>`);} else if(domain.includes("tiktok")&&!(domain==="tiktok.com"||domain.endsWith(".tiktok.com"))){score+=40;cards.push(`<div class="card red"><b>🎭 FAKE TIKTOK in ${type}:</b> ${link}</div>`);} else if(!isReal){score+=15;cards.push(`<div class="card yellow"><b>🔗 Unknown link in ${type}:</b> ${link}<br>Domain: ${domain}</div>`);} else {cards.push(`<div class="card green"><b>🔗 Link OK:</b> ${link}</div>`);}});
 let patterns={"EcoCash steal":["pin yako","secret code","enter pin"],"Money lure":["you won","usd 500","congratulations"],"Urgency":["urgent","act now"]};
 for(let cat in patterns){for(let kw of patterns[cat]){if(text.includes(kw)){score+=20;cards.push(`<div class="card yellow"><b>${cat} detected in ${type}:</b> '${kw}'</div>`);break;}}}
 let res=document.getElementById('result'); let scoreEl=document.getElementById('score'); let det=document.getElementById('details');
 let color=score>=70?"#FF3B30":score>=40?"#FFCC00":"#34C759"; let label=score>=70?"🚨 HIGH RISK - SCAM!":score>=40?"⚠️ MEDIUM RISK":"✅ LOW RISK - Safe";
 res.innerText=type+' Result: '+label; res.style.color=color; scoreEl.innerText=`Score: ${Math.min(score,100)}/100 | Type: ${type}`; det.innerHTML=cards.join('')||`<div class="card green">No threats in ${type} - Aaron shield active</div>`;
 if(score>=40) det.innerHTML+=`<div class="card red"><b>WHAT TO DO:</b><br>1. Don't enter PIN<br>2. Don't click<br>3. Report: Police 995 | Ambulance 114 | Econet Fraud *121#<br>4. Delete & block</div>`;
}
</script>
<script>document.addEventListener('contextmenu',e=>e.preventDefault()); if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js')}</script>
</body>
</html>
